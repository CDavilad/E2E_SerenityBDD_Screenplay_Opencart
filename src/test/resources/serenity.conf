serenity {
  take.screenshots = FOR_EACH_ACTION
  restart.browser.for.each = scenario
  encoding = "UTF-8"
  report.encoding = "UTF-8"
  compress.filenames = true
}

headless.mode = false

webdriver {
  base.url = "http://opencart.abstracta.us"
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors",
        "--window-size=1280,900", "disable-infobars", "disable-gpu", "disable-default-apps",
        "disable-popup-blocking", "disable-dev-shm-usage", "disable-extensions",
        "disable-translate", "disable-logging"]
    }
  }
}

timeouts {
  implicit.wait = 10
  flush.rate    = 100
}
